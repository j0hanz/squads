[tool.ruff]
target-version = "py314"
line-length = 79

[tool.ruff.lint]
select = [
    "E4", "E7", "E9", "F",
    "I",
    "B",
    "UP",
    "C4",
    "SIM",
    "FLY",
    "PIE",
    "RET",
    "PERF",
    "FURB",
    "ASYNC",
    "LOG",
    "RUF",
    "ERA",
    "PGH",
]
ignore = []

[tool.ruff.format]
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["skills/brainstorm/scripts/tests"]

[dependency-groups]
dev = [
    "ruff>=0.12",
    "pytest>=8",
]